<!DOCTYPE html>
<html>
<head>
    <title>Cookie Visit Counter</title>
</head>
<body>

    <h2>Enter Your Name</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter your name" required>
        <input type="submit" value="Submit">
    </form>

    {% if name %}
        <h3>Welcome, {{ name }}!</h3>
        <p>You have visited this page {{ count }} times.</p>
    {% endif %}

</body>
</html>
