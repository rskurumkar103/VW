<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            
        }
        th {
            background-color: aqua;
        }
        .pass {
            color: green;
            font-weight: bold;
        }
        .fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Final Results</h2>
    <table>
        <tr>
            <th>Student Name</th>
            <th>Marks</th>
            <th>Result</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.marks }}</td>
            <td>
                {% if student.marks >= 50 %}
                    <span class="pass">Pass</span>
                {% else %}
                    <span class="fail">Fail</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
