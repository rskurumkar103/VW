<!DOCTYPE html>
<html>
<head>
    <title>{{ role }} Dashboard</title>

    <style>
        body {
            font-family: Georgia, serif;
            background-color: #eef2f7;
            margin: 0;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #2f4f4f;
            margin-bottom: 30px;
        }

        .section {
            background-color: #ffffff;
            border: 1px solid #b0c4de;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            text-align: left;
        }

        h2 {
            color: #4682b4;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        p {
            margin: 8px 0;
            color: #333;
        }

        .button {
            padding: 6px 14px;
            background-color: #6a5acd;
            color: white;
            border: 1px solid #6a5acd;
            border-radius: 3px;
            font-size: 14px;
            margin-right: 8px;
        }
    </style>

</head>
<body>

    <h1>{{ role }} Dashboard</h1>

    {% for section in sections %}
        <div class="section">
            <h2>{{ section }}</h2>

            <p><strong>Fields:</strong> {{ fields | join(", ") }}</p>

            <p>
                {% for action in action_buttons %}
                    <button class="button">{{ action }}</button>
                {% endfor %}
            </p>
        </div>
    {% endfor %}

</body>
</html>
