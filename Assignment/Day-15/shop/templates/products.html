<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

<h2>Products</h2>

{% for name, price in products.items() %}
    <p>
        <b>{{ name }}</b> - ₹{{ price }}
        <a href="/add/{{ name }}">Add to Cart</a>
    </p>
{% endfor %}

<br>
<a href="/cart">Go to Cart</a>

</body>
</html>
