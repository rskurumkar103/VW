<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ employee.name }}'s Profile</title>
</head>
<body>
    <h1>{{ employee.name }}</h1>
    <p>Email: {{ employee.email }}</p>
    <p>Department: {{ employee.department }}</p>

    {% if session['role'] in ['Admin', 'Employee'] %}
        <a href="{{ url_for('edit_employee', id=employee.id) }}">Edit</a>
    {% endif %}
    <br><a href="{{ url_for('view_all_employees') }}">Back to Employee List</a>
</body>
</html>
